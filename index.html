<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | PREMIUM STORE</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --main: #007bff; --bg: #050505; --card: #0d0d0d; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Navbar */
        nav { background: #000; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; color: var(--main); cursor: pointer; }
        .cart-icon-btn { font-size: 22px; color: white; cursor: pointer; position: relative; transition: 0.3s; }
        .cart-icon-btn:hover { color: var(--main); }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--main); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

        /* حاويات الصفحات */
        .page { display: none; padding: 40px 10%; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* كروت المنتجات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #151515; padding: 25px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--main); transform: translateY(-5px); }
        .card i { font-size: 35px; color: var(--main); margin-bottom: 15px; }

        /* أزرار */
        .btn { background: var(--main); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-outline { background: none; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
        .remove-btn { color: var(--red); background: none; border: none; cursor: pointer; font-size: 18px; }

        /* صفحة السلة */
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 20px; border-radius: 15px; margin-bottom: 10px; border-right: 4px solid var(--main); }
        .cart-footer { margin-top: 30px; text-align: center; border-top: 1px solid #222; padding-top: 20px; }

        /* Apple Alert */
        .apple-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); width: 280px; border-radius: 20px; border: 1px solid #333; visibility: hidden; opacity: 0; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 10000; }
        .apple-alert.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .alert-btn { width: 100%; padding: 12px; background: none; border: none; border-top: 1px solid #222; color: var(--main); cursor: pointer; font-weight: bold; }

        /* Gun Icon */
        .gun { position: fixed; bottom: 15px; left: 15px; color: #111; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('shop-page')">NEXUS</div>
        <div class="cart-icon-btn" onclick="showPage('cart-page')">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cart-badge-count">0</span>
        </div>
    </nav>

    <!-- صفحة المتجر -->
    <div id="shop-page" class="page active">
        <h2 style="text-align: center; margin-bottom: 40px; color: var(--main);">PREMIUM SERVICES</h2>
        <div class="grid" id="products-list"></div>
    </div>

    <!-- صفحة السلة -->
    <div id="cart-page" class="page">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <button class="btn-outline" onclick="showPage('shop-page')"><i class="fas fa-arrow-right"></i></button>
            <h2 style="margin: 0;">Shopping Cart</h2>
        </div>
        
        <div id="cart-items-container">
            <!-- المنتجات المضافة ستظهر هنا -->
        </div>

        <div class="cart-footer">
            <div style="font-size: 20px; margin-bottom: 20px;">Total: <span id="cart-total-price" style="color: var(--main); font-weight: bold;">$0.00</span></div>
            <div style="max-width: 400px; margin: 0 auto;">
                <input type="text" placeholder="Sale Code" id="coupon" style="background:#000; border:1px solid #222; color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:15px; text-align:center;">
                <button class="btn" style="padding: 18px; font-size: 18px;" onclick="checkout()">Checkout & Open Ticket</button>
            </div>
        </div>
    </div>

    <div class="gun" onclick="adminGo()"><i class="fas fa-gun"></i></div>

    <!-- Apple Alert -->
    <div class="apple-alert" id="alert">
        <div style="padding: 25px; text-align: center;">
            <h2 id="at" style="color: var(--main); margin: 0 0 10px 0; font-size: 18px;">NEXUS</h2>
            <p id="am" style="margin: 0; font-size: 14px;"></p>
        </div>
        <button class="alert-btn" onclick="closeA()">OK</button>
    </div>

    <script>
        const socket = io();
        let cart = [];

        socket.on('init', (data) => {
            const list = document.getElementById('products-list');
            list.innerHTML = data.products.map(p => `
                <div class="card">
                    <i class="fas ${p.icon || 'fa-cube'}"></i>
                    <h3>${p.name}</h3>
                    <div style="font-size: 22px; font-weight: bold; margin-bottom: 15px;">$${p.price.toFixed(2)}</div>
                    <button class="btn" onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                </div>
            `).join('');
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function addToCart(name, price) {
            cart.push({ id: Date.now(), name, price });
            updateCartUI();
            showA("NEXUS", `تم إضافة ${name} للسلة`);
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const badge = document.getElementById('cart-badge-count');
            const totalDisplay = document.getElementById('cart-total-price');
            
            badge.innerText = cart.length;
            
            if(cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:gray;">Your cart is empty.</p>`;
                totalDisplay.innerText = "$0.00";
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight: bold;">${item.name}</div>
                            <div style="color: var(--main); font-size: 14px;">$${item.price.toFixed(2)}</div>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');
            
            totalDisplay.innerText = "$" + total.toFixed(2);
        }

        function checkout() {
            if(cart.length === 0) return showA("Error", "السلة فارغة");
            showA("Payment", "يرجى فتح تذكرة (Ticket) في الديسكورد للشراء");
        }

        function adminGo() { window.location.href = '/login'; }

        function showA(t, m) {
            document.getElementById('at').innerText = t;
            document.getElementById('am').innerText = m;
            document.getElementById('alert').classList.add('active');
        }
        function closeA() { document.getElementById('alert').classList.remove('active'); }
    </script>
</body>
</html>
